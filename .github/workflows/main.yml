# .github/workflows/dast-zap.yml
# DAST (Dynamic Application Security Testing) avec OWASP ZAP.
# ZAP est HTTP : il scanne la surface web de la cible, pas le S7comm/Modbus.
# Ici la cible est le honeypot Conpot (interface HTTP sur le port 80).

name: DAST - OWASP ZAP

on:
  workflow_dispatch:        # lancement manuel
  push:
    branches: [ main ]

jobs:
  dast:
    runs-on: ubuntu-latest
    name: Scan DAST (ZAP) contre le honeypot Conpot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) Démarrer la CIBLE : Conpot expose son interface HTTP sur le port 80
      - name: Lancer Conpot (cible)
        run: |
          docker run -d --name conpot \
            -p 80:80 -p 102:102 -p 502:502 \
            honeynet/conpot:latest
          # Attendre que le service HTTP réponde avant de scanner
          for i in $(seq 1 30); do
            if curl -sf http://localhost:80 >/dev/null; then echo "Conpot up"; break; fi
            sleep 2
          done

      # 2) Scan DAST passif de la surface HTTP
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: 'http://localhost:80'
          cmd_options: '-a'               # inclut les règles passives "alpha"
          allow_issue_writing: false      # ne crée pas d'issue automatiquement

      # 3) Récupérer le rapport comme artefact du run
      - name: Upload rapport ZAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            report_html.html
            report_md.md
